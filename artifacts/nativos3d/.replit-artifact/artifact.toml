kind = "web"
previewPath = "/"
title = "Nativos 3D – Link in Bio"
version = "1.0.0"
id = "artifacts/nativos3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20949

[services.development]
run = "pnpm --filter @workspace/nativos3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nativos3d", "run", "build" ]
publicDir = "artifacts/nativos3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20949"
BASE_PATH = "/"
